# NOTE: Vercel deploys automatically via its native GitHub integration.
# This workflow is intentionally disabled to avoid failed runs from missing secrets.
# Vercel's built-in integration handles all deployments on push to main.
# To re-enable: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to GitHub Secrets.

name: Vercel Deploy (Disabled)

on:
  workflow_dispatch: # manual trigger only

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: echo "Deployments are handled by Vercel native GitHub integration."
